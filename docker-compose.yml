version: '3.8'

services:
  bot:
    image: ghcr.io/full-bars/spc-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spc-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-data:/app/cache
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python main.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

volumes:
  bot-data:
