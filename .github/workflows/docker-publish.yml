name: Docker Build and Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: System build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgeos-dev libproj-dev proj-bin libgdal-dev libhdf5-dev libnetcdf-dev
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -q

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Multi-Arch Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export AMD64 Tarball
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }} --platform linux/amd64
          docker save ghcr.io/${{ github.repository }}:${{ github.ref_name }} | gzip > spcbot-${{ github.ref_name }}-linux-amd64.tar.gz

      - name: Export ARM64 Tarball
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }} --platform linux/arm64
          docker save ghcr.io/${{ github.repository }}:${{ github.ref_name }} | gzip > spcbot-${{ github.ref_name }}-linux-arm64.tar.gz

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} spcbot-${{ github.ref_name }}-linux-amd64.tar.gz spcbot-${{ github.ref_name }}-linux-arm64.tar.gz --clobber
